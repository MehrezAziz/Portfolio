# Host nginx server block for azizmehrez.com — place at
#   /etc/nginx/conf.d/azizmehrez.conf
# on a VPS whose host nginx already serves other sites (e.g. Local Smart Delivery).
# It proxies to the portfolio app started via docker-compose.app.yml (127.0.0.1:3001).

server {
    listen 80;
    listen [::]:80;
    server_name azizmehrez.com www.azizmehrez.com;
    return 301 https://azizmehrez.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name azizmehrez.com www.azizmehrez.com;

    # Cloudflare Origin Certificate (create in Cloudflare → SSL/TLS → Origin Server).
    ssl_certificate     /etc/nginx/certs/azizmehrez/origin.pem;
    ssl_certificate_key /etc/nginx/certs/azizmehrez/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Send www to the apex domain.
    if ($host = www.azizmehrez.com) {
        return 301 https://azizmehrez.com$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
