# Reverse proxy for the Next.js app (container name: web, port 3000).
# Works with a bare IP now; ready for a domain + HTTPS later.

server {
    listen 80;
    listen [::]:80;
    server_name _;   # matches any host / the VPS IP. Change to your domain later.

    # Let's Encrypt HTTP-01 challenge (used when you add SSL). Harmless now.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Gzip for faster loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache Next.js static assets aggressively.
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ----------------------------------------------------------------------------
