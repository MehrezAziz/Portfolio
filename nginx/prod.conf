# Production reverse proxy for azizmehrez.com behind Cloudflare (Full Strict).
# Uses a Cloudflare Origin Certificate mounted at /etc/nginx/certs/.

# --- HTTP: redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name azizmehrez.com www.azizmehrez.com;
    return 301 https://azizmehrez.com$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name azizmehrez.com www.azizmehrez.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Send www visitors to the apex domain.
    if ($host = www.azizmehrez.com) {
        return 301 https://azizmehrez.com$request_uri;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Real visitor IP as forwarded by Cloudflare:
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
