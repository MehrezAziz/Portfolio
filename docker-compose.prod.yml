# Production stack for azizmehrez.com (HTTPS via Cloudflare Origin Certificate).
# Usage on the VPS:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Requires the Cloudflare Origin cert at nginx/certs/origin.pem and
# nginx/certs/origin.key (see DEPLOY.md — Cloudflare section).

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_FORMSPREE_ID: ${NEXT_PUBLIC_FORMSPREE_ID:-REPLACE_WITH_YOUR_FORM_ID}
    image: aziz-portfolio:latest
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
