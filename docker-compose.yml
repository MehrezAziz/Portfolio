services:
  web:
    build:
      context: .
      args:
        # Read from the server's .env file (see .env.example). Optional.
        NEXT_PUBLIC_FORMSPREE_ID: ${NEXT_PUBLIC_FORMSPREE_ID:-REPLACE_WITH_YOUR_FORM_ID}
    image: aziz-portfolio:latest
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      # Uncomment when you add a domain + SSL (see DEPLOY.md):
      # - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment these two when enabling HTTPS with Certbot:
      # - ./nginx/certbot/conf:/etc/letsencrypt:ro
      # - ./nginx/certbot/www:/var/www/certbot:ro
